        type: string
        format: uuid
        description: Shop ID
      state_id:
        type: string
        format: uuid
        description: State ID
      company_name:
        type: string
        description: Company name
      company_registration_no:
        type: string
        description: Company registration number
      company_email:
        type: string
        description: Company email
      company_contact:
        type: string
        description: Company contact number
      name:
        type: string
        description: Shop name
      type:
        type: string
        description: Shop type
      address:
        type: string
        description: Shop address
      pic_name:
        type: string
        description: Person in charge name
      pic_contact:
        type: string
        description: Person in charge contact
      pic_email:
        type: string
        description: Person in charge email
      username:
        type: string
        description: Shop login username
      is_active:
        type: boolean
        description: Whether the shop is active
      created_at:
        type: string
        format: date-time
        description: Creation timestamp
      updated_at:
        type: string
        format: date-time
        description: Last update timestamp

  # Claim Models
  CreateClaimRequest:
    type: object
    properties:
      warranty_id:
        type: string
        format: uuid
        description: Warranty ID
      claim_no:
        type: string
        description: Claim number
      status:
        type: string
        description: Claim status
        enum: [pending, approved, rejected, processing]
      claim_date:
        type: string
        format: date
        description: Claim date
      damaged_image_url:
        type: string
        description: URL of damaged product image
      remarks:
        type: string
        description: Additional remarks
    required:
      - warranty_id
      - claim_no
      - status
      - damaged_image_url

  ClaimResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Claim ID
      warranty_id:
        type: string
        format: uuid
        description: Warranty ID
      claim_no:
        type: string
        description: Claim number
      status:
        type: string
        description: Claim status
      claim_date:
        type: string
        format: date
        description: Claim date
      damaged_image_url:
        type: string
        description: URL of damaged product image
      resolution_image_url:
        type: string
        description: URL of resolution image
      remarks:
        type: string
        description: Additional remarks
      created_at:
        type: string
        format: date-time
        description: Creation timestamp
      updated_at:
        type: string
        format: date-time
        description: Last update timestamp

  # Missing Model Definitions

  # Product Series Models
  CreateProductSeriesRequest:
    type: object
    properties:
      productTypeId:
        type: string
        format: uuid
        description: Product type ID this series belongs to
      name:
