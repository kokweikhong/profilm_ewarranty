definitions:
  # Error Response
  ErrorResponse:
    type: object
    properties:
      error:
        type: string
        description: Error message
      code:
        type: integer
        description: Error code
    required:
      - error

  # Product Brand Models
  CreateProductBrandRequest:
    type: object
    properties:
      name:
        type: string
        description: Brand name
        example: "Profilm"
    required:
      - name

  UpdateProductBrandRequest:
    type: object
    properties:
      name:
        type: string
        description: Updated brand name
        example: "Profilm Updated"

  ProductBrandResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Brand ID
      name:
        type: string
        description: Brand name
      isActive:
        type: boolean
        description: Whether the brand is active
      createdAt:
        type: string
        format: date-time
        description: Creation timestamp
      updatedAt:
        type: string
        format: date-time
        description: Last update timestamp

  # Product Type Models
  CreateProductTypeRequest:
    type: object
    properties:
      brandId:
        type: string
        format: uuid
        description: Brand ID this type belongs to
      name:
        type: string
        description: Type name
        example: "Window Tinting Film"
      description:
        type: string
        description: Type description
    required:
      - brandId
      - name

  UpdateProductTypeRequest:
    type: object
    properties:
      brandId:
        type: string
        format: uuid
        description: Brand ID this type belongs to
      name:
        type: string
        description: Updated type name
      description:
        type: string
        description: Updated type description

  ProductTypeResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Type ID
      brandId:
        type: string
        format: uuid
        description: Brand ID
      name:
        type: string
        description: Type name
      description:
        type: string
        description: Type description
      isActive:
        type: boolean
        description: Whether the type is active
      createdAt:
        type: string
        format: date-time
        description: Creation timestamp
      updatedAt:
        type: string
        format: date-time
        description: Last update timestamp

  # Product Models
  CreateProductRequest:
    type: object
    properties:
      product_name_id:
        type: string
        format: uuid
        description: Product name ID
      warranty_year_id:
        type: string
        format: uuid
        description: Warranty year ID
      film_serial_no:
        type: string
        description: Film serial number
        example: "SN2025000001"
      manufacture_date:
        type: string
        format: date
        description: Manufacture date
      expiry_date:
        type: string
        format: date
        description: Expiry date
    required:
      - product_name_id
      - warranty_year_id
      - film_serial_no

  UpdateProductRequest:
    type: object
    properties:
      product_name_id:
        type: string
        format: uuid
        description: Product name ID
      warranty_year_id:
        type: string
        format: uuid
        description: Warranty year ID
      film_serial_no:
        type: string
        description: Film serial number
      manufacture_date:
        type: string
        format: date
        description: Manufacture date
      expiry_date:
        type: string
        format: date
        description: Expiry date

  ProductResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Product ID
      product_name_id:
        type: string
        format: uuid
        description: Product name ID
      warranty_year_id:
        type: string
        format: uuid
        description: Warranty year ID
      film_serial_no:
        type: string
        description: Film serial number
      manufacture_date:
        type: string
        format: date
        description: Manufacture date
      expiry_date:
        type: string
        format: date
        description: Expiry date
      is_active:
        type: boolean
        description: Whether the product is active
      created_at:
        type: string
        format: date-time
        description: Creation timestamp
      updated_at:
        type: string
        format: date-time
        description: Last update timestamp

  # Shop Models
  CreateShopRequest:
    type: object
    properties:
      state_id:
        type: string
        format: uuid
        description: State ID
      company_name:
        type: string
        description: Company name
      company_registration_no:
        type: string
        description: Company registration number
      company_email:
        type: string
        format: email
        description: Company email
      company_contact:
        type: string
        description: Company contact number
      name:
        type: string
        description: Shop name
      type:
        type: string
        description: Shop type
      address:
        type: string
        description: Shop address
      pic_name:
        type: string
        description: Person in charge name
      pic_contact:
        type: string
        description: Person in charge contact
      pic_email:
        type: string
        format: email
        description: Person in charge email
      username:
        type: string
        description: Shop login username
    required:
      - state_id
      - company_name
      - company_registration_no
      - company_email
      - company_contact
      - name
      - type
      - pic_name
      - pic_contact
      - pic_email
      - username

  ShopResponse:
    type: object
