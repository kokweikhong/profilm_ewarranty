      - name

  UpdateProductSeriesRequest:
    type: object
    properties:
      productTypeId:
        type: string
        format: uuid
        description: Product type ID this series belongs to
      name:
        type: string
        description: Updated series name
      description:
        type: string
        description: Updated series description

  ProductSeriesResponse:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Series ID
      productTypeId:
        type: string
        format: uuid
        description: Product type ID
      name:
        type: string
        description: Series name
      description:
        type: string
        description: Series description
      isActive:
        type: boolean
        description: Whether the series is active
      createdAt:
        type: string
        format: date-time
        description: Creation timestamp
      updatedAt:
        type: string
        format: date-time
        description: Last update timestamp

  # Product Name Models
  CreateProductNameRequest:
    type: object
    properties:
      productSeriesId:
        type: string
        format: uuid
        description: Product series ID this name belongs to
