swagger: "2.0"
info:
  title: ProFilm eWarranty API
  description: API for managing ProFilm warranty claims, products, shops, and more
  version: "1.0.0"
  contact:
    name: ProFilm Support
    email: support@profilm.com
host: localhost:8080
basePath: /
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: Authorization

tags:
  - name: Health
    description: Health check endpoints
  - name: Products
    description: Product management endpoints
  - name: Product Brands
    description: Product brand management
  - name: Product Types
    description: Product type management
  - name: Product Series
    description: Product series management
  - name: Warranty Years
    description: Warranty year management
  - name: Shops
    description: Shop management endpoints
  - name: States
    description: State management endpoints
  - name: Product Allocations
    description: Product allocation management
  - name: Warranties
    description: Warranty management endpoints
  - name: Car Parts
    description: Car part management
  - name: Claims
    description: Claim management endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API server is running
      responses:
        200:
          description: Server is healthy
          schema:
            type: object
            properties:
              status:
                type: string
                example: ok
              message:
                type: string
                example: Server is running

  # Product Brand Endpoints
  /products/brands:
    post:
      tags:
        - Product Brands
      summary: Create a new product brand
      description: Create a new product brand in the system
      parameters:
        - in: body
          name: brand
          description: Product brand object
          required: true
          schema:
            $ref: "#/definitions/CreateProductBrandRequest"
      responses:
        201:
          description: Product brand created successfully
          schema:
            $ref: "#/definitions/ProductBrandResponse"
        400:
          description: Invalid request payload
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorResponse"
    get:
      tags:
        - Product Brands
      summary: List all product brands
      description: Retrieve a list of all product brands
      responses:
        200:
          description: List of product brands
          schema:
            type: array
            items:
              $ref: "#/definitions/ProductBrandResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorResponse"

  /products/brands/{id}:
    get:
      tags:
        - Product Brands
      summary: Get product brand by ID
      description: Retrieve a specific product brand by its ID
      parameters:
        - in: path
          name: id
          type: string
          format: uuid
          required: true
          description: Product brand ID
      responses:
        200:
          description: Product brand details
          schema:
            $ref: "#/definitions/ProductBrandResponse"
        404:
          description: Product brand not found
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorResponse"
    put:
      tags:
        - Product Brands
      summary: Update product brand
      description: Update an existing product brand
      parameters:
        - in: path
          name: id
          type: string
          format: uuid
          required: true
          description: Product brand ID
        - in: body
          name: brand
          description: Updated product brand object
          required: true
          schema:
            $ref: "#/definitions/UpdateProductBrandRequest"
      responses:
        200:
          description: Product brand updated successfully
          schema:
            $ref: "#/definitions/ProductBrandResponse"
        400:
          description: Invalid request payload
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          description: Product brand not found
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorResponse"
    delete:
      tags:
        - Product Brands
      summary: Delete product brand
      description: Delete a product brand from the system
      parameters:
        - in: path
          name: id
          type: string
          format: uuid
          required: true
          description: Product brand ID
      responses:
        204:
          description: Product brand deleted successfully
        404:
          description: Product brand not found
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/ErrorResponse"

